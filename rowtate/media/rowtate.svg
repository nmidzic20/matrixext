<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 128 128">

  <!-- Horizontal rows (left) -->
  <g fill="currentColor">
    <rect x="0" y="30" width="42" height="10" rx="5"/>
    <rect x="0" y="54" width="42" height="10" rx="5"/>
    <rect x="0" y="78" width="42" height="10" rx="5"/>
  </g>

  <!-- Swap arrows (center) -->
  <g stroke="currentColor"
     stroke-width="8"
     stroke-linecap="round"
     stroke-linejoin="round"
     fill="none">

    <!-- Top arrow -->
    <line x1="50" y1="52" x2="86" y2="52"/>
    <polyline points="78,44 86,52 78,60"/>

    <!-- Bottom arrow -->
    <line x1="86" y1="76" x2="50" y2="76"/>
    <polyline points="58,68 50,76 58,84"/>
  </g>

  <!-- Vertical key/value columns (right) -->
  <g fill="currentColor">
    <rect x="100" y="26" width="10" height="76" rx="5"/>
    <rect x="118" y="26" width="10" height="76" rx="5"/>
  </g>

</svg>
