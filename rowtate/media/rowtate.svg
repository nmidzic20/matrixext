<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420" width="900" height="420">
  <defs>
    <!-- Soft background -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1020"/>
      <stop offset="1" stop-color="#101a3a"/>
    </linearGradient>

    <!-- A few row gradients -->
    <linearGradient id="g1" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ff4d6d"/>
      <stop offset="1" stop-color="#ffd166"/>
    </linearGradient>
    <linearGradient id="g2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#4cc9f0"/>
      <stop offset="1" stop-color="#b5179e"/>
    </linearGradient>
    <linearGradient id="g3" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#80ff72"/>
      <stop offset="1" stop-color="#7b2cbf"/>
    </linearGradient>

    <!-- Glow -->
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Dot paths (reuse the same horizontal path, different Y via translate) -->
    <path id="rowPath" d="M 120 0 H 780" />
  </defs>

  <!-- Background -->
  <rect width="900" height="420" fill="url(#bg)"/>

  <!-- Centered rotating "stack" -->
  <g transform="translate(450 210)">
    <!-- Slight ambient rotation of entire stack -->
    <animateTransform attributeName="transform" type="rotate"
      additive="sum" dur="18s" values="-2;2;-2" repeatCount="indefinite"/>

    <!-- Rows -->
    <!-- Each row is a rounded line + moving dots. Different phase + rotation amplitude. -->
    <g filter="url(#glow)">
      <!-- Row 1 -->
      <g transform="translate(0 -120)">
        <animateTransform attributeName="transform" type="rotate"
          additive="sum" dur="6.5s" values="-8;8;-8" repeatCount="indefinite"/>
        <line x1="-330" y1="0" x2="330" y2="0" stroke="url(#g1)" stroke-width="14" stroke-linecap="round" opacity="0.95"/>
        <line x1="-330" y1="0" x2="330" y2="0" stroke="#ffffff" stroke-width="2" stroke-linecap="round" opacity="0.18"/>
        <g transform="translate(-450 0)">
          <circle r="7" fill="#ffd166">
            <animateMotion dur="3.8s" repeatCount="indefinite" keyTimes="0;1" keySplines=".42,0,.58,1" calcMode="spline">
              <mpath href="#rowPath"/>
            </animateMotion>
          </circle>
          <circle r="5" fill="#ff4d6d" opacity="0.9">
            <animateMotion dur="5.2s" begin="-1.2s" repeatCount="indefinite">
              <mpath href="#rowPath"/>
            </animateMotion>
          </circle>
        </g>
      </g>

      <!-- Row 2 -->
      <g transform="translate(0 -70)">
        <animateTransform attributeName="transform" type="rotate"
          additive="sum" dur="7.5s" values="10;-10;10" repeatCount="indefinite"/>
        <line x1="-340" y1="0" x2="340" y2="0" stroke="url(#g2)" stroke-width="12" stroke-linecap="round" opacity="0.92"/>
        <line x1="-340" y1="0" x2="340" y2="0" stroke="#ffffff" stroke-width="2" stroke-linecap="round" opacity="0.16"/>
        <g transform="translate(-450 0)">
          <circle r="6" fill="#4cc9f0">
            <animateMotion dur="4.4s" begin="-0.8s" repeatCount="indefinite">
              <mpath href="#rowPath"/>
            </animateMotion>
          </circle>
          <circle r="4.5" fill="#b5179e" opacity="0.9">
            <animateMotion dur="6.3s" begin="-2.1s" repeatCount="indefinite">
              <mpath href="#rowPath"/>
            </animateMotion>
          </circle>
        </g>
      </g>

      <!-- Row 3 -->
      <g transform="translate(0 -20)">
        <animateTransform attributeName="transform" type="rotate"
          additive="sum" dur="5.8s" values="-12;12;-12" repeatCount="indefinite"/>
        <line x1="-360" y1="0" x2="360" y2="0" stroke="url(#g3)" stroke-width="16" stroke-linecap="round" opacity="0.92"/>
        <line x1="-360" y1="0" x2="360" y2="0" stroke="#ffffff" stroke-width="2" stroke-linecap="round" opacity="0.14"/>
        <g transform="translate(-450 0)">
          <circle r="7.5" fill="#80ff72">
            <animateMotion dur="3.2s" begin="-0.4s" repeatCount="indefinite">
              <mpath href="#rowPath"/>
            </animateMotion>
          </circle>
          <circle r="5.5" fill="#7b2cbf" opacity="0.9">
            <animateMotion dur="4.9s" begin="-1.6s" repeatCount="indefinite">
              <mpath href="#rowPath"/>
            </animateMotion>
          </circle>
        </g>
      </g>

      <!-- Row 4 -->
      <g transform="translate(0 35)">
        <animateTransform attributeName="transform" type="rotate"
          additive="sum" dur="8.2s" values="7;-7;7" repeatCount="indefinite"/>
        <line x1="-335" y1="0" x2="335" y2="0" stroke="url(#g1)" stroke-width="11" stroke-linecap="round" opacity="0.9"/>
        <line x1="-335" y1="0" x2="335" y2="0" stroke="#ffffff" stroke-width="2" stroke-linecap="round" opacity="0.15"/>
        <g transform="translate(-450 0)">
          <circle r="6" fill="#ffd166">
            <animateMotion dur="5.6s" begin="-1.0s" repeatCount="indefinite">
              <mpath href="#rowPath"/>
            </animateMotion>
          </circle>
          <circle r="4.5" fill="#ff4d6d" opacity="0.9">
            <animateMotion dur="3.9s" begin="-2.4s" repeatCount="indefinite">
              <mpath href="#rowPath"/>
            </animateMotion>
          </circle>
        </g>
      </g>

      <!-- Row 5 -->
      <g transform="translate(0 90)">
        <animateTransform attributeName="transform" type="rotate"
          additive="sum" dur="6.9s" values="-9;9;-9" repeatCount="indefinite"/>
        <line x1="-320" y1="0" x2="320" y2="0" stroke="url(#g2)" stroke-width="15" stroke-linecap="round" opacity="0.9"/>
        <line x1="-320" y1="0" x2="320" y2="0" stroke="#ffffff" stroke-width="2" stroke-linecap="round" opacity="0.14"/>
        <g transform="translate(-450 0)">
          <circle r="7" fill="#4cc9f0">
            <animateMotion dur="4.0s" begin="-0.2s" repeatCount="indefinite">
              <mpath href="#rowPath"/>
            </animateMotion>
          </circle>
          <circle r="5" fill="#b5179e" opacity="0.9">
            <animateMotion dur="6.8s" begin="-1.9s" repeatCount="indefinite">
              <mpath href="#rowPath"/>
            </animateMotion>
          </circle>
        </g>
      </g>
    </g>

    <!-- A subtle central orb -->
    <circle r="26" fill="#ffffff" opacity="0.08"/>
    <circle r="18" fill="#ffffff" opacity="0.10"/>
    <circle r="10" fill="#ffffff" opacity="0.12"/>
  </g>

  <!-- Tiny star specks -->
  <g opacity="0.45">
    <circle cx="120" cy="70" r="1.6" fill="#fff"/>
    <circle cx="210" cy="320" r="1.2" fill="#fff"/>
    <circle cx="820" cy="90" r="1.4" fill="#fff"/>
    <circle cx="760" cy="360" r="1.2" fill="#fff"/>
    <circle cx="450" cy="40" r="1.3" fill="#fff"/>
  </g>
</svg>
